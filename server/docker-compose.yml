services:
  beamlet:
    build: .
    container_name: beamlet
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - beamlet-data:/data
      - ./apns_key.p8:/app/apns_key.p8:ro
    environment:
      - BEAMLET_DB_PATH=/data/beamlet.db
      - BEAMLET_DATA_DIR=/data/files
      - BEAMLET_PORT=8080
      - BEAMLET_APNS_KEY_PATH=/app/apns_key.p8
      - BEAMLET_APNS_KEY_ID=${BEAMLET_APNS_KEY_ID:?Set APNs Key ID}
      - BEAMLET_APNS_TEAM_ID=${BEAMLET_APNS_TEAM_ID:?Set APNs Team ID}
      - BEAMLET_APNS_BUNDLE_ID=com.beamlet.app
      - BEAMLET_MAX_FILE_SIZE=524288000
      - BEAMLET_EXPIRY_DAYS=30
      - BEAMLET_EXTERNAL_URL=${BEAMLET_EXTERNAL_URL:-}

volumes:
  beamlet-data:
