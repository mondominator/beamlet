name: Beamlet
options:
  bundleIdPrefix: com.beamlet
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: S6WU9SVVDW
    CODE_SIGN_STYLE: Automatic

targets:
  Beamlet:
    type: application
    platform: macOS
    sources:
      - path: Beamlet
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.beamlet.mac
        INFOPLIST_FILE: Beamlet/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Beamlet/Resources/Beamlet.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: Beamlet/Resources/Beamlet.entitlements
    # Extensions can be added later via Xcode UI
    # dependencies:
    #   - target: BeamletShareExtension
