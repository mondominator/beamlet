name: Beamlet
options:
  bundleIdPrefix: com.beamlet
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: S6WU9SVVDW

targets:
  Beamlet:
    type: application
    platform: iOS
    sources:
      - Beamlet
    resources:
      - Beamlet/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.beamlet.app
        INFOPLIST_FILE: Beamlet/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: S6WU9SVVDW
        ENABLE_PREVIEWS: YES
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
          DEVELOPMENT_TEAM: S6WU9SVVDW
        Release:
          CODE_SIGN_IDENTITY: "Apple Development"
          DEVELOPMENT_TEAM: S6WU9SVVDW
    entitlements:
      path: Beamlet/Resources/Beamlet.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.beamlet.shared
        aps-environment: development
    dependencies:
      - target: BeamletShare
        embed: true

  BeamletShare:
    type: app-extension
    platform: iOS
    sources:
      - BeamletShare
      - path: Beamlet/Data
        group: Shared
      - path: Beamlet/Model
        group: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.beamlet.app.share
        INFOPLIST_FILE: BeamletShare/Info.plist
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: S6WU9SVVDW
        SKIP_INSTALL: YES
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
          DEVELOPMENT_TEAM: S6WU9SVVDW
        Release:
          CODE_SIGN_IDENTITY: "Apple Development"
          DEVELOPMENT_TEAM: S6WU9SVVDW
    entitlements:
      path: BeamletShare/BeamletShare.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.beamlet.shared

  BeamletTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - BeamletTests
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: S6WU9SVVDW
    dependencies:
      - target: Beamlet

schemes:
  Beamlet:
    build:
      targets:
        Beamlet: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BeamletTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
